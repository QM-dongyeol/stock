services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-manager
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      SECRET_KEY: ${SECRET_KEY:-stock-manager-change-this}
      DATABASE_URL: ${DATABASE_URL:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@kuma.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-1234}
      MIGRATION_OWNER_EMAIL: ${MIGRATION_OWNER_EMAIL:-dongyeol.jung@gmail.com}
      MIGRATION_OWNER_PASSWORD: ${MIGRATION_OWNER_PASSWORD:-1234}
    restart: unless-stopped
